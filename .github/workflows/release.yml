name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Windows binaries
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Build release binaries
        run: cargo build --release --bin ghost --bin ghost-http --bin ghost-mcp

      - name: Stage artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/release/ghost.exe dist/
          Copy-Item target/release/ghost-http.exe dist/
          Copy-Item target/release/ghost-mcp.exe dist/
          Copy-Item README.md dist/
          Copy-Item CHANGELOG.md dist/ -ErrorAction SilentlyContinue
          Copy-Item LICENSE dist/ -ErrorAction SilentlyContinue
          Compress-Archive -Path dist/* -DestinationPath ghost-windows-x64.zip

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ghost-windows-x64
          path: ghost-windows-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ghost-windows-x64.zip
            target/release/ghost.exe
            target/release/ghost-http.exe
            target/release/ghost-mcp.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
